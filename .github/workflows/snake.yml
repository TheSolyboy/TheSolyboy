name: Generate Snake Animation

on:
  schedule:
    # Kjører hver 12. time
    - cron: "0 */12 * * *"
  # Lar deg kjøre manuelt fra Actions-fanen
  workflow_dispatch:
  # Kjører ved push til main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=2BD96B&color_dots=161B22,0E4429,006D32,26A641,39D353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
