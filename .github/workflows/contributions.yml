name: Generate Contribution Grid

on:
  schedule:
    # Oppdaterer hver 6. time
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build terminal.svg
        run: python scripts/generate_contributions.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet terminal.svg; then
            git add terminal.svg
            git commit -m "chore: refresh terminal contribution grid"
            git push
          else
            echo "No changes to terminal.svg"
          fi
